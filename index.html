                if (match14) {

            const summaryText = useMemo(() => {
                const data = currentData;

                const dateStr = fmtDate(data.deliveryDate);

                const plansSummary = data.plans.map(p => {

                }).join('гҖҒ');
                const sims = data.plans.map(p => p.simNumber).filter(s => s).join('гҖҒ');

                    case 'delivery_photo': return `гҖҗеӮҷиЁ»гҖ‘и«Ӣе·ҘзЁӢж–ј${dateStr}дәӨд»ҳSIMеҚЎпјҢйңҖеё¶жҳ“жӢүеҜ¶еҚ”еҠ©жӢҚз…§пјҢз…§зүҮи«ӢдёҠеӮійӣ»йҠ·е·ҘзЁӢзҫӨи¬қи¬қпјҒ\n\n${base}`;
                    case 'install_delivery': return `гҖҗеӮҷиЁ»гҖ‘и«Ӣе·ҘзЁӢеңЁ${dateStr}иЈқж©ҹз•¶еӨ©дәӨд»ҳSIMеҚЎпјҢз„Ўй ҲжӢҚз…§пјҢи¬қи¬қпјҒ\n\n${base}`;
                    case 'install_photo_new': return `гҖҗеӮҷиЁ»гҖ‘и«Ӣе·ҘзЁӢж–ј${dateStr}иЈқж©ҹз•¶еӨ©йңҖеё¶жҳ“жӢүеҜ¶еҚ”еҠ©жӢҚз…§пјҢз…§зүҮи«ӢдёҠеӮійӣ»йҠ·пјҶе·ҘзЁӢзҫӨи¬қи¬қпјҒ\n\n${base}`;

                    case 'mail_card':

                    case 'self_pickup':

                    case 'cht_renew': return `гҖҗдёӯиҸҜзәҢзҙ„д»¶рҹҡ©гҖ‘\nв–Әе®ўжҲ¶е§“еҗҚпјҡ${data.customerName}\nв–Әе®ўжҲ¶з·Ёиҷҹпјҡ${data.customerId}\nв–ӘиЁӮе–®з·Ёиҷҹпјҡ${orderIdStr}\nв–ӘиіҮиІ»ж–№жЎҲпјҡ${plansSummary}\nв–ӘSIMеҚЎпјҡ${sims}\nв–Әз¶Іи·Ҝж–№жЎҲпјҡ${nets}\nв–ӘзёҪиЁҲжҮүж”¶пјҡ${totalAmount}пјҲж”¶ж¬ҫж–№ејҸпјҡзҸҫе ҙдёҚж”¶иІ»пјү`;

                        return `пј»зәҢзҙ„жҲ¶пјҪеҸҜзӣҙжҺҘе…Ҙеёі${ispM}\n<${reg || ''}> <${data.buildingName || ''}> <${data.customerName || ''} ${data.customerId || ''}>\nйӣҷз¶Із”ЁжҲ¶${plansSummary}пјҢеҠ иҙҲ${ispM}ISPз¶Іи·Ҝ\nжҷәз”ҹжҙ»иЁӮе–®з·Ёиҷҹпјҡ${orderIdStr}\nй–Җиҷҹй–ӢйҖҡж—Ҙпјҡ${actDateStr}\nи«ӢеҚ”еҠ©е…Ҙеёі пјҢи¬қи¬қпјҒ`;
                    case 'double_refund':
                        const regD = data.region === 'е…¶д»–' ? data.regionCustom : data.region;
                        const ispMD = (data.ispMonths === 'е…¶д»–' ? data.ispMonthsCustom : data.ispMonths) + 'еҖӢжңҲ';
                        const refA = data.refundAmount === 'е…¶д»–' ? data.refundAmountCustom : data.refundAmount;
                        return `${data.customerName} ${data.customerId}пјҢе…ЁйЎҚйҖҖиІ»$${refA}пјҢи«ӢеҚ”еҠ©еҫҢзәҢпјҢи¬қи¬қгҖӮ\n\nпј»йҖҖиІ»пјҪе…ЁйЎҚйҖҖиІ»${refA}пјҢйҮҚе…Ҙеёі${ispMD}\n<${regD || ''}> <${data.buildingName || ''}> <${data.customerName || ''} ${data.customerId || ''}>\nйӣҷз¶Із”ЁжҲ¶${plansSummary}пјҢиҙҲйҖҒ${ispMD}ISPз¶Іи·Ҝ\nжҷәз”ҹжҙ»иЁӮе–®з·Ёиҷҹпјҡ${orderIdStr}\nй–Җиҷҹй–ӢйҖҡж—Ҙпјҡ${actDateStr}\nи«ӢеҚ”еҠ©е…Ҙеёі пјҢи¬қи¬қпјҒ`;
                    default: return '';
                }
            }, [currentData, mode, isFinanceMode]);

            const handleCopy = () => {
                const el = document.createElement('textarea');
                el.value = summaryText;
                document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                setCopied(true); setTimeout(() => setCopied(false), 2000);
            };

            const ModeButtons = () => {
                const items = [
                    { id: 'pure_delivery', label: 'еҺҹз”ЁжҲ¶е–®зҙ”йҖҒеҚЎ', cat: 'dispatch', icon: 'truck', style: 'light' },
                    { id: 'delivery_photo', label: 'еҺҹз”ЁжҲ¶йҖҒеҚЎжӢҚз…§', cat: 'dispatch', icon: 'camera', style: 'light' },
                    { id: 'install_delivery', label: 'ж–°иЈқж©ҹйҖҒеҚЎ', cat: 'dispatch', icon: 'home', style: 'dark' },
                    { id: 'install_photo_new', label: 'ж–°иЈқж©ҹжӢҚз…§', cat: 'dispatch', icon: 'camera', style: 'dark' },
                    { id: 'install_delivery_photo', label: 'ж–°иЈқж©ҹйҖҒеҚЎжӢҚз…§', cat: 'dispatch', icon: 'image', style: 'dark' },
                    { id: 'self_pickup', label: 'е®ўиҮіж“ҡй»һеҸ–еҚЎ', cat: 'dispatch', icon: 'map-pin', style: 'gray' },
                    { id: 'mail_card', label: 'еҜ„еҚЎ', cat: 'dispatch', icon: 'mail', style: 'gray' },
                    { id: 'cht_renew', label: 'дёӯиҸҜзәҢзҙ„', cat: 'dispatch', icon: 'user', style: 'gray' },
                    { id: 'isp_renew', label: 'ISPзәҢзҙ„жҲ¶е…Ҙеёі', cat: 'finance', icon: 'user', style: 'light' },
                    { id: 'double_refund', label: 'йӣҷз¶ІйҖҖиІ»', cat: 'finance', icon: 'user', style: 'light' }
                ];
                return (
                    <div className="flex gap-3 overflow-x-auto no-scrollbar py-2">
                        {items.filter(i => i.cat === activeCategory).map(item => {
                            const isActive = mode === item.id;
                            let currentClass = isActive ? "active" : (item.style === 'dark' ? "inactive-dark" : (item.style === 'gray' ? "inactive-gray" : "inactive-light"));
                            return (
                                <button key={item.id} onClick={() => setMode(item.id)} className={`mode-btn ${currentClass}`}>
                                    <Icon name={item.icon} size={16} />
                                    {item.label}
                                </button>
                            );
                        })}
                    </div>
                );
            };

            const SelectField = ({ label, name, optionsList, value, customValue, onChange, icon, isPrimary = false, className = "", hideCustom = false }) => (
                <div className={`space-y-1 ${className}`}>
                    <label className={`text-[11px] font-black uppercase tracking-wider block flex items-center gap-1 ${isPrimary ? 'text-[#14ccb9]' : 'text-slate-400'}`}>
                        {icon && <Icon name={icon} size={10} />} {label}
                    </label>
                    <div className="relative">
                        <select name={name} value={value} onChange={onChange} className={`w-full px-3 py-3 bg-white border ${isPrimary ? 'border-[#14ccb9]' : 'border-slate-200'} rounded-input font-bold outline-none appearance-none transition-all focus:ring-2 focus:ring-[#14ccb9]/20`}>
                            <option value="">и«ӢйҒёж“Ү</option>
                            {optionsList.map(o => <option key={o} value={o}>{o + (['networkMonth', 'ispMonths'].includes(name) && o !== 'е…¶д»–' && !o.includes('еҖӢжңҲ') ? 'еҖӢжңҲ' : '')}</option>)}
                        </select>
                        <div className="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400"><Icon name="chevron-down" size={16}/></div>
                    </div>
                    {(!hideCustom && value === 'е…¶д»–') && <input name={`${name}Custom`} value={customValue || ''} onChange={onChange} placeholder="и«Ӣијёе…Ҙ" className="w-full mt-2 px-3 py-2 border border-[#14ccb9] rounded-input text-[#14ccb9] font-bold text-sm outline-none bg-[#14ccb9]/5" />}
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    <div className="sticky top-0 z-[100] bg-white border-b border-slate-200 shadow-sm">
                        <header className="px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="text-2xl font-black text-slate-700">жҷәз”ҹжҙ» <span className="text-[#14ccb9]">SmaDay</span></div>
                            </div>
                            <button onClick={() => setAllFormData(prev => ({...prev, [mode]: initialFormState}))} className="px-6 py-2.5 text-[#14ccb9] border-2 border-[#14ccb9] rounded-xl font-black text-sm hover:bg-[#14ccb9] hover:text-white transition-all">йҮҚиЁӯе…§е®№</button>
                        </header>
                        <nav className="px-6 flex bg-slate-50 border-b border-slate-100">
                            {['dispatch', 'finance'].map(cat => (
                                <button key={cat} onClick={() => {setActiveCategory(cat); setMode(cat === 'dispatch' ? 'pure_delivery' : 'isp_renew')}} className={`px-8 py-3.5 font-black text-sm border-b-2 transition-all ${activeCategory === cat ? 'border-[#14ccb9] text-[#14ccb9]' : 'border-transparent text-slate-400'}`}>{cat === 'dispatch' ? 'жҙҫжЎҲжЁЎжқҝ' : 'еёіеӢҷжЁЎжқҝ'}</button>
                            ))}
                        </nav>
                        <div className="px-6 py-3 bg-white">
                            <ModeButtons />
                        </div>
                    </div>

                    <main className="flex-1 px-6 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
                        <div className="lg:col-span-7 bg-white p-8 rounded-[32px] custom-shadow border border-slate-100 space-y-8">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {isFinanceMode ? (
                                    <>
                                        <div className="md:col-span-2 grid grid-cols-2 gap-4">
                                            {mode === 'double_refund' ? (
                                                <SelectField label="йҖҖж¬ҫйҮ‘йЎҚ" name="refundAmount" optionsList={options.refundAmounts} value={currentData.refundAmount} customValue={currentData.refundAmountCustom} onChange={handleInputChange} isPrimary={true} />
                                            ) : (
                                                <SelectField label="ең°еҚҖ" name="region" optionsList={options.financeRegions} value={currentData.region} customValue={currentData.regionCustom} onChange={handleInputChange} isPrimary={true} />
                                            )}
                                            <SelectField label={mode === 'double_refund' ? "йҮҚе…ҘеёіжңҲд»Ҫ" : "е…ҘеёіжңҲд»Ҫ"} name="ispMonths" optionsList={options.financeMonths} value={currentData.ispMonths} customValue={currentData.ispMonthsCustom} onChange={handleInputChange} isPrimary={true} />
                                        </div>
                                        {mode === 'double_refund' && (
                                            <div className="md:col-span-2">
                                                <SelectField label="ең°еҚҖ" name="region" optionsList={options.financeRegions} value={currentData.region} customValue={currentData.regionCustom} onChange={handleInputChange} />
                                            </div>
                                        )}
                                        <div className="md:col-span-2 grid grid-cols-2 gap-4">
                                            <div><label className="text-xs font-black text-slate-400 block mb-1">зӨҫеҚҖеҗҚзЁұ</label><input name="buildingName" value={currentData.buildingName} onChange={handleInputChange} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-input font-bold outline-none focus:border-[#14ccb9]" /></div>
                                            <div><label className="text-xs font-black text-slate-400 block mb-1">е®ўжҲ¶е§“еҗҚ</label><input name="customerName" value={currentData.customerName} onChange={handleInputChange} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-input font-bold outline-none focus:border-[#14ccb9]" /></div>
                                        </div>
                                        <div className="md:col-span-2 grid grid-cols-2 gap-4">
                                            <div><label className="text-xs font-black text-slate-400 block mb-1">е®ўжҲ¶ ID</label><input name="customerId" value={currentData.customerId} onChange={handleInputChange} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-input font-bold outline-none focus:border-[#14ccb9]" /></div>
                                            <div><label className="text-xs font-black text-slate-400 block mb-1">иЁӮе–®з·Ёиҷҹ</label><input name="orderId" value={currentData.orderId} onChange={handleInputChange} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-input font-bold outline-none focus:border-[#14ccb9]" /></div>
                                        </div>
                                        <div className="md:col-span-2 border-t pt-8">
                                            <div className="flex justify-between items-center mb-6">
                                                <span className="font-black text-lg text-slate-700 flex items-center gap-2">й–ҖиҷҹиіҮиІ»иЁӯе®ҡ</span>
                                            </div>
                                            <div className="p-6 bg-slate-50 rounded-[24px] border border-slate-100 grid grid-cols-1 md:grid-cols-2 gap-5">
                                                <SelectField label="ж–№жЎҲйЎһеһӢ" name="contractType" optionsList={["ж”ңзўј", "ж–°иҫҰ"]} value={currentData.plans[0].contractType} onChange={(e)=>handlePlanChange(0, e)} isPrimary={true} />
                                                <SelectField label="еҗҲзҙ„иіҮиІ»" name="planAmount" optionsList={options.planAmount} value={currentData.plans[0].planAmount} customValue={currentData.plans[0].planAmountCustom} onChange={(e)=>handlePlanChange(0, e)} isPrimary={true} />
                                            </div>
                                            <div className="mt-4">
                                                <label className="text-[11px] font-black text-slate-400 block mb-1 uppercase tracking-wider">й–ӢйҖҡж—Ҙжңҹ</label>
                                                <input type="date" name="activationDate" value={currentData.activationDate} onChange={handleInputChange} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-input font-bold outline-none focus:border-[#14ccb9]" />
                                            </div>
                                        </div>
                                    </>
                                ) : (
                                    <>
                                        <div className="md:col-span-2 grid grid-cols-2 gap-4">
                                            <div><label className="text-xs font-black text-slate-400 block mb-1">е®ўжҲ¶е§“еҗҚ</label><input name="customerName" value={currentData.customerName} onChange={handleInputChange} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-input font-bold outline-none focus:border-[#14ccb9]" /></div>
                                            <div><label className="text-xs font-black text-slate-400 block mb-1">й җз№ійҮ‘з·Ёиҷҹ</label><input name="prepayId" value={currentData.prepayId} onChange={handleInputChange} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-input font-bold outline-none focus:border-[#14ccb9]" /></div>
                                        </div>
                                        <div className="md:col-span-2 border-t pt-8">
                                            <div className="flex justify-between items-center mb-6">
                                                <span className="font-black text-lg text-slate-700 flex items-center gap-2">й–ҖиҷҹиіҮиІ»жё…е–® <span className="text-xs bg-[#14ccb9]/10 text-[#14ccb9] px-2 py-0.5 rounded-full">е…ұ {currentData.plans.length} й–Җ</span></span>
                                                <button onClick={addNewPlan} className="px-4 py-2 bg-[#14ccb9] text-white rounded-xl text-sm font-black hover:bg-[#11ae9e] transition-all flex items-center gap-1">пјӢ ж–°еўһй–Җиҷҹ</button>
                                            </div>
                                            {currentData.plans.map((p, idx) => (
                                                <div key={idx} className="p-6 bg-slate-50 rounded-[24px] border border-slate-100 mb-6 flex flex-col gap-5 relative group">
                                                    {idx > 0 && <button onClick={() => removePlan(idx)} className="absolute -top-2 -right-2 bg-white border shadow-sm p-2 rounded-full text-rose-400 opacity-0 group-hover:opacity-100 transition-all"><Icon name="trash-2" size={16}/></button>}
                                                    <div className="border-b border-slate-200/50 pb-1 mb-1 flex items-center justify-between">
                                                        <span className="text-[10px] font-black text-[#14ccb9] uppercase tracking-[0.2em]">й–Җиҷҹ {idx+1} </span>
                                                        {idx === 0 && <span className="text-[9px] font-black text-slate-300">жҮүж”¶йҮ‘йЎҚд»ҘжӯӨй–ҖиҷҹзӮәдё»</span>}
                                                    </div>
                                                    <div className="w-full">
                                                        <label className="text-[11px] font-black text-slate-400 block mb-1 uppercase tracking-wider">жҷәз”ҹжҙ»иЁӮе–®з·Ёиҷҹ</label>
                                                        <input name="orderId" value={p.orderId} onChange={(e)=>handlePlanChange(idx, e)} className="w-full px-4 py-3 bg-white border border-slate-200 rounded-lg font-bold outline-none focus:border-[#14ccb9]" />
                                                    </div>
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                                        <SelectField label="йӣ»дҝЎе•Ҷ" name="telecom" optionsList={options.telecom} value={p.telecom} customValue={p.telecomCustom} onChange={(e)=>handlePlanChange(idx,e)} />
                                                        <SelectField label="еҗҲзҙ„йЎһеһӢ" name="contractType" optionsList={options.contractType} value={p.contractType} customValue={p.contractTypeCustom} onChange={(e)=>handlePlanChange(idx,e)} />
                                                        <SelectField label="жңҲз§ҹиІ»" name="planAmount" optionsList={options.planAmount} value={p.planAmount} customValue={p.planAmountCustom} onChange={(e)=>handlePlanChange(idx,e)} />
                                                        <SelectField label="еҗҲзҙ„жңҹ" name="period" optionsList={options.period} value={p.period} customValue={p.periodCustom} onChange={(e)=>handlePlanChange(idx,e)} />
                                                        <SelectField label="е®¶еәӯдёҠз¶Іж–№жЎҲ" name="networkMonth" optionsList={options.networkMonths} value={p.networkMonth} onChange={(e)=>handlePlanChange(idx,e)} icon="wifi" isPrimary={true} />
                                                        {idx === 0 && (
                                                            <div>
                                                                <label className="text-[11px] font-black text-slate-400 block mb-1 uppercase tracking-wider">жҮүж”¶йҮ‘йЎҚ (иҮӘеӢ•её¶е…Ҙ)</label>
                                                                <input 
                                                                    type="number" 
                                                                    name="amount" 
                                                                    value={p.amount} 
                                                                    onChange={(e)=>handlePlanChange(idx,e)} 
                                                                    className={`w-full px-4 py-3 bg-white border rounded-lg font-black text-lg transition-all ${p.amount === '0' ? 'text-slate-400 border-slate-200' : 'text-[#14ccb9] border-[#14ccb9] ring-2 ring-[#14ccb9]/10'}`} 
                                                                />
                                                            </div>
                                                        )}
                                                    </div>
                                                    <div className="w-full pt-2">
                                                        <label className="text-[11px] font-black text-slate-400 block mb-1 uppercase tracking-wider">SIMеҚЎеҚЎиҷҹ</label>
                                                        <input name="simNumber" value={p.simNumber} onChange={(e)=>handlePlanChange(idx,e)} placeholder="" className="w-full px-4 py-4 bg-white border border-slate-200 rounded-lg font-bold outline-none focus:border-[#14ccb9] shadow-sm transition-all" />
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </>
                                )}
                                {!isFinanceMode && (
                                    <div className="md:col-span-2 border-t pt-8 space-y-6">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="text-[11px] font-black text-slate-400 block uppercase mb-1">{mode === 'self_pickup' ? 'еҸ–еҚЎж—Ҙжңҹ' : (mode === 'mail_card' ? 'еҜ„д»¶ж—Ҙжңҹ' : 'й җе®ҡдәӨд»ҳж—Ҙжңҹ')}</label>
                                                <input type="date" name="deliveryDate" value={currentData.deliveryDate} onChange={handleInputChange} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-input font-bold outline-none focus:border-[#14ccb9]" />
                                            </div>
                                            <div>
                                                <label className="text-[11px] font-black text-slate-400 block uppercase mb-1">й җе®ҡй–ӢйҖҡж—Ҙжңҹ</label>
                                                <input type="date" name="activationDate" value={currentData.activationDate} onChange={handleInputChange} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-input font-bold outline-none focus:border-[#14ccb9]" />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4 items-start">
                                            <SelectField label="жҙҫжЎҲиІ иІ¬дәәе“Ў" name="staff" optionsList={options.staff} value={currentData.staff} customValue={currentData.staffCustom} onChange={handleInputChange} isPrimary={true} />
                                            <div className="space-y-1">
                                                <label className="text-[11px] font-black text-slate-400 block uppercase tracking-wider">жҳҜеҗҰйңҖи§Јзҙ„</label>
                                                <div className="flex gap-2">
                                                    <div onClick={() => setAllFormData(prev => ({...prev, [mode]: {...prev[mode], isNeedTermination: 'жҳҜ'}}))} className={`toggle-item ${currentData.isNeedTermination === 'жҳҜ' ? 'selected' : 'unselected'}`}>жҳҜ</div>
                                                    <div onClick={() => setAllFormData(prev => ({...prev, [mode]: {...prev[mode], isNeedTermination: 'еҗҰ'}}))} className={`toggle-item ${currentData.isNeedTermination === 'еҗҰ' ? 'selected' : 'unselected'}`}>еҗҰ</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                        <div className="lg:col-span-5">
                            <div className="bg-[#1e293b] rounded-[32px] p-8 sticky top-40 custom-shadow border border-slate-700">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-white font-black tracking-widest flex items-center gap-2">
                                        <span className="w-2 h-5 bg-[#14ccb9] rounded-full"></span> 
                                        еҚіжҷӮй җиҰҪ
                                    </h3>
                                    <button onClick={handleCopy} className={`px-6 py-2.5 rounded-xl font-black text-sm transition-all shadow-lg active:scale-95 ${copied ? 'bg-emerald-500 text-white' : 'bg-[#14ccb9] text-white hover:bg-[#11ae9e]'}`}>
                                        {copied ? 'е·ІиӨҮиЈҪе…§е®№' : 'дёҖйҚөиӨҮиЈҪ'}
                                    </button>
                                </div>
                                <div className="bg-slate-900/50 rounded-2xl p-6 border border-slate-800 min-h-[450px] overflow-hidden">
                                    <div key={summaryText} className="preview-content">
                                        <pre className="text-slate-300 text-sm font-mono whitespace-pre-wrap leading-relaxed select-all">
                                            {summaryText || 'и«Ӣй–Ӣе§ӢеЎ«еҜ«е·ҰеҒҙиіҮиЁҠд»Ҙз”ўз”ҹеҚіжҷӮй җиҰҪ...'}
                                        </pre>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
